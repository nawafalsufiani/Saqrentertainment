	    <form action="https://formsubmit.co/SaqrEntertainment@outlook.com" method="POST" class="mt-4" style="max-width: 600px; margin: 0 auto;">
      <!-- Name -->
      <div class="mb-3">
        <input type="text" name="name" class="form-control" placeholder="Your Name" required>
      </div>

      <!-- Email -->
      <div class="mb-3">

      </div>

      <!-- Message -->
      <div class="mb-3">
        <textarea name="message" rows="5" class="form-control" placeholder="Your Message" required></textarea>
      </div>

      <!-- Optional: redirect to thank you page -->
      <input type="hidden" name="_next" value="https://nawafalsufiani.github.io/SaqrEntertainment/thank-you.html">
      <input type="hidden" name="_captcha" value="false">

      <!-- Submit -->
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
